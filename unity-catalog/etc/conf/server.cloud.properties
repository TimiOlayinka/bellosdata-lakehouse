# ═══════════════════════════════════════════════════════════════
# BellosData Unity Catalog — Cloud Server Configuration
# Uses IAM user credentials (long-lived, no SSO rotation)
# ═══════════════════════════════════════════════════════════════
#
# IAM User: bellosdata-platform
# Policies: AmazonS3FullAccess, AWSBillingReadOnlyAccess
#
# SETUP: Replace YOUR_ACCESS_KEY and YOUR_SECRET_KEY with your
#        AWS IAM credentials before starting the service.
# ═══════════════════════════════════════════════════════════════

## Server settings
server.env=prod

## S3 Bucket Configuration — Bronze Layer (RDL)
s3.bucketPath.0=s3://playdarch-bronze-raw
s3.region.0=eu-west-2
s3.accessKey.0=YOUR_ACCESS_KEY
s3.secretKey.0=YOUR_SECRET_KEY

## S3 Bucket Configuration — Silver Layer (ODL)
s3.bucketPath.1=s3://playdarch-silver-curated
s3.region.1=eu-west-2
s3.accessKey.1=YOUR_ACCESS_KEY
s3.secretKey.1=YOUR_SECRET_KEY

## S3 Bucket Configuration — Gold Layer (ADL)
s3.bucketPath.2=s3://playdarch-gold-products
s3.region.2=eu-west-2
s3.accessKey.2=YOUR_ACCESS_KEY
s3.secretKey.2=YOUR_SECRET_KEY
